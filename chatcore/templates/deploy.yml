name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-{{ BOT_DIR }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            cd ~/projects/{{ BOT_DIR }}
            git fetch origin main
            git reset --hard origin/main
            git checkout --force -- .
            .venv/bin/pip install -q --force-reinstall -r requirements.txt
            # Один менеджер: гасим одноимённый system-юнит, если существует
            sudo -n systemctl stop {{ SERVICE_NAME }} 2>/dev/null || true
            sudo -n systemctl disable {{ SERVICE_NAME }} 2>/dev/null || true
            systemctl --user daemon-reload
            systemctl --user restart {{ SERVICE_NAME }}
            systemctl --user --no-pager status {{ SERVICE_NAME }} | head -5
