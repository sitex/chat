name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install "chatcore[dev] @ git+https://github.com/sitex/chat.git"
          pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall -q .
      - name: Validate data JSON
        run: python -c "import json,glob; [json.load(open(f)) for f in glob.glob('data/*.json')]"
      - name: Run tests
        run: pytest
